    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
        
        .prose { max-width: 100%; word-break: break-word; overflow-wrap: break-word; }
        .prose pre { background-color: #1e1e20; border-radius: 12px; padding: 1.25rem; overflow-x: auto; border: 1px solid #333; margin: 1.25rem 0; position: relative; max-width: 100%; }
        .prose code { color: #f87171; background-color: rgba(255,255,255,0.1); padding: 0.2rem 0.4rem; border-radius: 6px; font-size: 0.85em; font-family: 'Fira Code', monospace; }
        .prose a { color: #8ab4f8; text-decoration: underline; text-underline-offset: 4px; transition: color 0.2s; }
        .prose h1, .prose h2, .prose h3 { color: #fff; margin-top: 1.75rem; margin-bottom: 0.75rem; font-weight: 600; line-height: 1.4; }
        .prose h1 { font-size: 1.6em; }
        .prose h2 { font-size: 1.4em; }
        .prose h3 { font-size: 1.2em; }
        .prose p, .prose ul, .prose ol { margin-bottom: 1.25rem; line-height: 1.8; }
        .prose li { margin-bottom: 0.5rem; }
        .prose img { max-width: 100%; border-radius: 0.75rem; height: auto; margin: 1rem 0; }

        .typing-indicator span { animation: blink 1.4s infinite both; height: 5px; width: 5px; background-color: #888; border-radius: 50%; display: inline-block; margin: 0 2px; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

        .active-session { background-color: #33353a; color: white; border-left: 4px solid #8ab4f8; }
        .pinned-icon { transform: rotate(-45deg); color: #8ab4f8; }

        /* 麥克風錄音動畫 */
        @keyframes pulse-ring { 0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .recording-pulse { animation: pulse-ring 2s infinite; background-color: rgba(239, 68, 68, 0.15); border-radius: 50%; color: #ef4444 !important; }
    </style>

    <script>
        // ⚠️ 請確認此處替換為您最新部署的 Apps Script Web App URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzFsszt7ISWEIywCcSeJS1KmCeWpnCM0_qROm8yD-8Yg37hrOfW2w_gRUycjtwnRaBS/exec";

        marked.use({
            renderer: {
                link(hrefOrToken, title, text) {
                    let linkHref, linkTitle, linkText;
                    if (typeof hrefOrToken === 'object' && hrefOrToken !== null) {
                        linkHref = hrefOrToken.href;
                        linkTitle = hrefOrToken.title;
                        linkText = hrefOrToken.text;
                    } else {
                        linkHref = hrefOrToken;
                        linkTitle = title;
                        linkText = text;
                    }
                    const titleAttr = linkTitle ? `title="${linkTitle}"` : '';
                    return `<a href="${linkHref}" ${titleAttr} target="_blank" rel="noopener noreferrer">${linkText}</a>`;
                }
            }
        });

        let currentSessionId = generateUUID();
        let currentImageData = null, currentMimeType = null, currentDocumentText = null, currentDocumentName = null, currentYouTubeId = null;
        let isWaiting = false, currentRenderCode = "";
        let abortController = null; 
        let silenceTimer = null; 
        let currentGemsList = []; 

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sendBtnIcon = sendBtn.querySelector('.material-symbols-rounded');

        // 原生自動變高魔法
        userInput.addEventListener('input', function() {
            this.style.height = 'auto'; 
            this.style.height = (this.scrollHeight > 240 ? 240 : this.scrollHeight) + 'px';
        });

        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'cmn-Hant-TW'; 

            recognition.onstart = function() {
                isRecording = true;
                const micBtn = document.getElementById('mic-btn');
                micBtn.classList.add('recording-pulse');
                micBtn.classList.remove('text-gray-400');
                finalTranscript = userInput.value; 
                if (window.speechSynthesis) window.speechSynthesis.cancel(); 
            };

            recognition.onresult = function(event) {
                if (!isRecording) return; 
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                userInput.value = finalTranscript + interimTranscript;
                userInput.style.height = 'auto';
                userInput.style.height = (userInput.scrollHeight > 240 ? 240 : userInput.scrollHeight) + 'px';

                if (document.getElementById('continuous-mode-toggle').checked) {
                    clearTimeout(silenceTimer);
                    silenceTimer = setTimeout(() => {
                        if (isRecording && userInput.value.trim() !== '') {
                            stopRecording();
                            sendMessage();
                        }
                    }, 1500); 
                }
            };
            
            recognition.onerror = function(event) {
                console.error('語音辨識錯誤', event.error);
                stopRecording();
            };
            
            recognition.onend = function() {
                stopRecording();
            };
        }

        function startRecording() {
            if (!recognition) return;
            if (!isRecording) {
                isRecording = true;
                finalTranscript = userInput.value;
                try { recognition.start(); } catch(e) { isRecording = false; }
            }
        }
        
        function toggleRecording() {
            if (!recognition) {
                alert('您的瀏覽器不支援語音輸入。');
                return;
            }
            if (isRecording) { stopRecording(); } else { startRecording(); }
        }
        
        function stopRecording() {
            isRecording = false;
            clearTimeout(silenceTimer);
            const micBtn = document.getElementById('mic-btn');
            micBtn.classList.remove('recording-pulse');
            micBtn.classList.add('text-gray-400');
            if (recognition) { try { recognition.stop(); } catch(e) {} }
        }

        function speakText(text, isAutoPlay = false) {
            if (isAutoPlay && !document.getElementById('voice-output-toggle').checked) return false;
            if (!window.speechSynthesis) return false;
            window.speechSynthesis.cancel(); 
            
            const bt = String.fromCharCode(96, 96, 96);
            let cleanText = text.replace(new RegExp(bt + '[\\s\\S]*?' + bt, 'g'), '');
            cleanText = cleanText.replace(new RegExp('https?:\\/\\/[^\\s]+', 'g'), '網址');
            cleanText = cleanText.replace(new RegExp('[*_#~|]', 'g'), '').trim();
            if (!cleanText) return false;
            
            let utterance = new SpeechSynthesisUtterance(cleanText);
            const voices = window.speechSynthesis.getVoices();
            let selectedVoice = null;
            
            if (new RegExp('[\\u4e00-\\u9fa5]').test(cleanText)) {
                utterance.lang = 'zh-TW'; utterance.rate = 0.95; utterance.pitch = 0.95; 
                selectedVoice = voices.find(voice => voice.name.includes('Xiaoxiao') || voice.name.includes('Yating') || (voice.lang === 'zh-TW' && voice.name.includes('Google')));
                if (!selectedVoice) selectedVoice = voices.find(voice => voice.lang === 'zh-TW');
            } else {
                utterance.lang = 'en-US'; utterance.rate = 0.9; utterance.pitch = 0.95;
                selectedVoice = voices.find(voice => voice.name.includes('Samantha') || (voice.lang === 'en-US' && voice.name.includes('Google')));
                if (!selectedVoice) selectedVoice = voices.find(voice => voice.lang === 'en-US');
            }
            
            if (selectedVoice) utterance.voice = selectedVoice;
            if (isAutoPlay) {
                utterance.onend = function() {
                    if (document.getElementById('continuous-mode-toggle').checked && !isWaiting) {
                        startRecording();
                    }
                };
            }
            window.speechSynthesis.speak(utterance);
            return true;
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        let pdfjsLibLoaded = false;
        async function loadPdfJs() {
            if (pdfjsLibLoaded) return;
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
                script.onload = () => {
                    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                    pdfjsLibLoaded = true;
                    resolve();
                };
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }
        
        let mammothLoaded = false;
        async function loadMammoth() {
            if (mammothLoaded) return;
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = "https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js";
                script.onload = () => { mammothLoaded = true; resolve(); };
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }
        
        let xlsxLoaded = false;
        async function loadXlsx() {

        userInput.addEventListener('paste', function(e) {
            const pasteText = (e.clipboardData || window.clipboardData).getData('text');

            const ytMatch = pasteText.match(ytRegex);
            
            if (ytMatch && ytMatch[1]) {
                e.preventDefault();
                currentYouTubeId = ytMatch[1];
                document.getElementById('yt-thumbnail').src = `https://img.youtube.com/vi/${currentYouTubeId}/mqdefault.jpg`;
                document.getElementById('youtube-preview').classList.remove('hidden');
                document.getElementById('image-preview').classList.add('hidden');
                document.getElementById('doc-preview').classList.add('hidden');
                document.getElementById('upload-preview-container').classList.remove('hidden');
                document.getElementById('web-search-toggle').checked = true;
                return;
            }
            
            if (e.clipboardData && e.clipboardData.items) {
                const items = e.clipboardData.items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf('image') !== -1) {
                        e.preventDefault();
                        const file = items[i].getAsFile();
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            currentImageData = event.target.result;
                            currentMimeType = file.type;
                            document.getElementById('image-preview').src = currentImageData;
                            document.getElementById('image-preview').classList.remove('hidden');
                            document.getElementById('doc-preview').classList.add('hidden');
                            document.getElementById('youtube-preview').classList.add('hidden');
                            document.getElementById('upload-preview-container').classList.remove('hidden');
                        };
                        reader.readAsDataURL(file);
                        return;
                    }
                }
            }
            
            if (pasteText && pasteText.startsWith('data:image/')) {
                e.preventDefault();
                currentImageData = pasteText;
                const mimeMatch = pasteText.match(new RegExp('data:(.*?);'));
                currentMimeType = mimeMatch ? mimeMatch[1] : 'image/png';

        async function sendMessage() {
            clearTimeout(silenceTimer);
            stopRecording(); 
            const text = userInput.value.trim();
            if (!text && !currentImageData && !currentDocumentText && !currentYouTubeId) return;
            if (isWaiting) return;
            if (window.speechSynthesis) window.speechSynthesis.cancel(); 

            const isWebSearchEnabled = document.getElementById('web-search-toggle').checked;
            const isAutoImageEnabled = document.getElementById('auto-image-toggle').checked;
            
            let activeGemPrompt = null;
            let activeGemModel = null;
            const gemSelector = document.getElementById('gem-selector');
            if (gemSelector.value !== "") {
                activeGemPrompt = currentGemsList[parseInt(gemSelector.value)].prompt;
                activeGemModel = currentGemsList[parseInt(gemSelector.value)].model;
            }

            let displayMsg = text;
            if (currentDocumentName) displayMsg = `📎 [文件: ${currentDocumentName}]\n${text}`;
            if (currentYouTubeId) displayMsg = `📺 [YouTube 影片]\n${text}`;
            
            if (activeGemPrompt && !currentDocumentName && !currentYouTubeId) {
                const gemName = currentGemsList[parseInt(gemSelector.value)].name;
                const modelTag = activeGemModel ? ` (${activeGemModel})` : '';
                displayMsg = `【使用角色：${gemName}${modelTag}】\n${text}`;
            }

            appendMessage('user', displayMsg, currentImageData);
            
            let payloadText = text || "請分析此內容";
            if (currentDocumentText) {
                payloadText = `【檔案：${currentDocumentName}】\n${currentDocumentText}\n\n指令：${payloadText}`;
            } else if (currentYouTubeId) {
                payloadText = `【指定 YouTube 影片】：https://www.youtube.com/watch?v=${currentYouTubeId}\n\n指令：${payloadText}`;
            }

            userInput.value = '';
            userInput.style.height = 'auto';
            finalTranscript = ''; 
            const imgBase64 = currentImageData ? currentImageData.split(',')[1] : null;
            const mime = currentMimeType;
            const finalYoutubeId = currentYouTubeId; 
            
            clearUpload();
            toggleSendButton(true);
            const loadingId = appendLoading();
            abortController = new AbortController(); 

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        message: payloadText,
                        session_id: currentSessionId,
                        file_data: imgBase64,
                        mime_type: mime,
                        web_search: isWebSearchEnabled,
                        auto_image: isAutoImageEnabled,
                        youtube_id: finalYoutubeId,
                        gem_prompt: activeGemPrompt,
                        gem_model: activeGemModel
                    }),
                    signal: abortController.signal
                });
                
                const data = await response.json();
                removeLoading(loadingId);
                
                if (data.status === "error") throw new Error(data.error || "伺服器發生未知錯誤");
                
                if (data.reply) {
                    appendMessage('ai', data.reply, data.image ? `data:${data.mime};base64,${data.image}` : null, data.model);
                    const willSpeak = speakText(data.reply, true);
                    if (!willSpeak && document.getElementById('continuous-mode-toggle').checked) {
                        setTimeout(startRecording, 500);
                    }
                }
                loadSessions(); 
            } catch (err) {
                removeLoading(loadingId);
                if (err.name === 'AbortError') {
                    appendMessage('ai', `🛑 **生成已手動中止。**\n您可以隨時輸入新的指令。`);
                } else {
                    appendMessage('ai', `❌ 執行失敗：\n\`\`\`text\n${err.message}\n\`\`\``);
                }
            } finally {
                toggleSendButton(false);
                abortController = null;
            }
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            const ext = file.name.split('.').pop().toLowerCase();
            
            if (file.type.startsWith('image/')) {
                reader.onload = (e) => {
                    currentImageData = e.target.result;
                    currentMimeType = file.type;
                    document.getElementById('image-preview').src = currentImageData;
                    document.getElementById('image-preview').classList.remove('hidden');
                    document.getElementById('doc-preview').classList.add('hidden');
                    document.getElementById('youtube-preview').classList.add('hidden');
                    document.getElementById('upload-preview-container').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            } else if (file.type === 'application/pdf' || ext === 'pdf') {
                const loadingId = appendLoading();
                try {
                    await loadPdfJs();
                    reader.onload = async (e) => {
                        try {
                            const pdf = await pdfjsLib.getDocument(new Uint8Array(e.target.result)).promise;
                            let text = "";
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const content = await page.getTextContent();
                                text += content.items.map(s => s.str).join(' ') + "\n";
                            }
                            setDocPayload(file.name, text);
                        } catch (err) {
                            alert("PDF 解析失敗");
                        } finally {
                            removeLoading(loadingId);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                } catch (err) {
                    removeLoading(loadingId);
                    alert("載入 PDF 引擎失敗");
                }
            } else if (ext === 'docx') {
                const loadingId = appendLoading();
                try {
                    await loadMammoth();
                    reader.onload = async (e) => {
                        try {
                            const result = await mammoth.extractRawText({ arrayBuffer: e.target.result });
                            setDocPayload(file.name, result.value);
                        } catch(err) {
                            alert("Word 解析失敗");
                        } finally {
                            removeLoading(loadingId);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                } catch (err) {
                    removeLoading(loadingId);
                    alert("載入 Word 引擎失敗");
                }
            } else if (ext === 'xlsx' || ext === 'csv') {
                const loadingId = appendLoading();
                try {
                    await loadXlsx();
                    reader.onload = (e) => {
                        try {
                            const workbook = XLSX.read(e.target.result, { type: 'array' });
                            let text = "";
                            workbook.SheetNames.forEach(sheetName => {
                                text += `\n--- 表單: ${sheetName} ---\n`;
                                let csvData = XLSX.utils.sheet_to_csv(workbook.Sheets[sheetName]);
                                const CHAR_LIMIT = 500000;
                                if (csvData.length > CHAR_LIMIT) {
                                    text += csvData.substring(0, CHAR_LIMIT) + "\n\n...[⚠️ 檔案極大，已自動截斷最後部分]...";
                                } else {
                                    text += csvData;
                                }
                            });
                            setDocPayload(file.name, text);
                        } catch(err) {
                            alert("Excel 解析失敗");
                        } finally {
                            removeLoading(loadingId);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                } catch (err) {
                    removeLoading(loadingId);
                    alert("載入 Excel 引擎失敗");
                }
            } else if (ext === 'pptx') {
                const loadingId = appendLoading();
                try {
                    await loadJszip();
                    reader.onload = async (e) => {
                        try {
                            const zip = new JSZip();
                            const loadedZip = await zip.loadAsync(e.target.result);
                            let text = `【系統解析：簡報檔名 ${file.name}】\n\n`;
                            const slideFiles = Object.keys(loadedZip.files).filter(name => name.match(new RegExp('^ppt/slides/slide\\\\d+\\\\.xml$')));
                            const notesFiles = Object.keys(loadedZip.files).filter(name => name.match(new RegExp('^ppt/notesSlides/notesSlide\\\\d+\\\\.xml$')));
                            const sortRegex = new RegExp('(\\\\d+)\\\\.xml$');
                            slideFiles.sort((a, b) => parseInt(a.match(sortRegex)?.[1] || '0') - parseInt(b.match(sortRegex)?.[1] || '0'));
                            const parser = new DOMParser();
                            for (const slidePath of slideFiles) {
                                const slideNum = slidePath.match(sortRegex)?.[1];
                                text += `--- 第 ${slideNum} 頁 ---\n`;
                                const slideXmlString = await loadedZip.file(slidePath).async("string");
                                if (slideXmlString) {
                                    const xmlDoc = parser.parseFromString(slideXmlString, "text/xml");
                                    const textNodes = xmlDoc.getElementsByTagName("a:t");
                                    let extractedText = "";
                                    for (let i = 0; i < textNodes.length; i++) {
                                        extractedText += textNodes[i].textContent + " ";
                                    }
                                    text += `[投影片內容]:\n${extractedText.trim()}\n`;
                                }
                                const notePath = `ppt/notesSlides/notesSlide${slideNum}.xml`;
                                if (notesFiles.includes(notePath)) {
                                    const noteXmlString = await loadedZip.file(notePath).async("string");
                                    if (noteXmlString) {
                                        const xmlDoc = parser.parseFromString(noteXmlString, "text/xml");
                                        const textNodes = xmlDoc.getElementsByTagName("a:t");
                                        let extractedText = "";
                                        for (let i = 0; i < textNodes.length; i++) {
                                            extractedText += textNodes[i].textContent + " ";
                                        }
                                        if (extractedText.trim()) text += `[講者備忘錄]:\n${extractedText.trim()}\n`;
                                    }
                                }
                                text += `\n`;
                            }
                            setDocPayload(file.name, text);
                        } catch (err) {
                            alert("PPTX 解析失敗");
                        } finally {
                            removeLoading(loadingId);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                } catch (err) {
                    removeLoading(loadingId);
                    alert("載入 ZIP 引擎失敗");
                }
            } else {
                reader.onload = (e) => setDocPayload(file.name, e.target.result);
                reader.readAsText(file);
            }
        }

        function appendMessage(role, text, imageSrc = null, model = null) {
            const isAI = role === 'ai';
            const wrap = document.createElement('div');
            wrap.className = `flex gap-3 sm:gap-4 max-w-4xl mx-auto w-full group ${!isAI ? 'flex-row-reverse' : ''}`;
            const avatar = `<div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full flex items-center justify-center shrink-0 shadow-lg ${isAI ? 'bg-blue-600' : 'bg-gray-700'}"><span class="material-symbols-rounded text-white text-[18px] sm:text-xl">${isAI ? 'smart_toy' : 'person'}</span></div>`;
            let body = `<div class="flex-1 ${!isAI ? 'text-right' : ''} space-y-2 max-w-[90%] sm:max-w-[85%] relative min-w-0">`;
            
            if (imageSrc) {
                body += `<img src="${imageSrc}" class="rounded-xl border border-[#333] mb-2 max-w-full">`;
            }
            
            if (text) {
                const parsedText = isAI ? marked.parse(text) : text.replace(new RegExp('\\n', 'g'), '<br>');
                body += `<div class="prose prose-invert text-gray-200 bg-[#1e1f22] p-4 sm:p-5 rounded-2xl rounded-tl-none shadow-sm text-base sm:text-lg leading-relaxed">${parsedText}</div>`;
            }
            
            if (isAI && text) {
                body += `<div class="flex items-center gap-2 mt-2 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">
                    <button class="copy-btn p-1.5 text-gray-400 hover:text-white hover:bg-[#333] rounded-md" title="複製">
                        <span class="material-symbols-rounded text-[16px] sm:text-[18px]">content_copy</span>
                    </button>
                    <button class="speak-btn p-1.5 text-gray-400 hover:text-green-400 hover:bg-[#333] rounded-md" title="朗讀此訊息">
                        <span class="material-symbols-rounded text-[16px] sm:text-[18px]">volume_up</span>
                    </button>
                </div>`;
            }
            
            body += `</div>`;
            wrap.innerHTML = avatar + body;
            chatContainer.appendChild(wrap);
            
            if (isAI) {
                wrap.querySelectorAll('pre code').forEach(code => {
                    const lang = code.className;
                    if (lang.includes('language-html') || lang.includes('language-jsx') || lang.includes('language-javascript')) {

                        btn.innerHTML = '<span class="material-symbols-rounded text-[12px] sm:text-sm">play_circle</span> 預覽';
                        btn.onclick = () => openPreview(code.innerText);
                        code.parentElement.appendChild(btn);
                    }
                });
            }
            
            if (isAI && text) {
                const copyBtn = wrap.querySelector('.copy-btn');
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(text).then(() => {
                        const icon = copyBtn.querySelector('.material-symbols-rounded');
                        icon.innerText = 'check';
                        icon.classList.add('text-green-400');
                        setTimeout(() => {
                            icon.innerText = 'content_copy';
                            icon.classList.remove('text-green-400');
                        }, 2000);
                    });
                };
                
                const speakBtn = wrap.querySelector('.speak-btn');
                speakBtn.onclick = () => { speakText(text, false); };
            }
            scrollToBottom();
        }

        async function switchSession(id, title) {
            if (id === currentSessionId && chatContainer.children.length > 1) return;
            currentSessionId = id;
            document.getElementById('mobile-title').innerText = title;
            chatContainer.innerHTML = '';
            const loadingId = appendLoading();
            
            if (window.innerWidth < 768) toggleSidebar();
            
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ mode: 'system', action: 'load_session', session_id: id })
                });
                const data = await res.json();
                removeLoading(loadingId);
                let logsData = data.logs || [];
                if (Array.isArray(logsData)) {
                    logsData.forEach(l => appendMessage(l.role === 'ai' ? 'ai' : 'user', l.text));
                }
                loadSessions();
            } catch (e) {
                console.error(e);
            }
        }

                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ mode: 'system', action: 'get_session_list' })
                });
                const data = await res.json();
                const list = document.getElementById('session-list');
                list.innerHTML = '';
                if (!data || !data.sessions || !Array.isArray(data.sessions)) return;
                
                data.sessions.forEach(s => {
                    const isActive = s.id === currentSessionId;
                    const isPinned = s.pinned;
                    const item = document.createElement('div');
                    item.className = `group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all ${isActive ? 'active-session' : 'text-gray-400 hover:bg-[#2a2b2f] hover:text-white'}`;
                    const iconName = isPinned ? 'push_pin' : (isActive ? 'chat_bubble' : 'chat');
                    
                    item.innerHTML = `
                        <div class="flex items-center gap-3 truncate flex-1 min-w-0">
                            <span class="material-symbols-rounded text-lg shrink-0 ${isPinned ? 'pinned-icon' : ''}">${iconName}</span>

                        </div>
                        <div class="flex items-center gap-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 shrink-0 ml-2 transition-opacity">

                                <span class="material-symbols-rounded text-[16px]">push_pin</span>
                            </button>
                            <button class="p-1 edit-btn hover:text-blue-400 hover:bg-[#333] rounded-md transition-colors">
                                <span class="material-symbols-rounded text-[16px]">edit</span>
                            </button>
                            <button class="p-1 del-btn hover:text-red-400 hover:bg-[#333] rounded-md transition-colors">
                                <span class="material-symbols-rounded text-[16px]">delete</span>
                            </button>
                        </div>`;
                        
                    item.onclick = () => switchSession(s.id, s.title);
                    item.querySelector('.pin-btn').onclick = (e) => { e.stopPropagation(); togglePinSession(s.id, isPinned); };
                    item.querySelector('.edit-btn').onclick = (e) => { e.stopPropagation(); renameSession(s.id, s.title); };
                    item.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); deleteSession(s.id); };
                    list.appendChild(item);
                });
            } catch (e) {}
        }

        async function togglePinSession(id, current) {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ mode: 'system', action: 'pin_session', session_id: id, is_pinned: !current }) });
            loadSessions();
        }

        async function renameSession(id, old) {
            const n = prompt("重命名對話：", old);
            if (n && n.trim()) {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ mode: 'system', action: 'rename_session', session_id: id, new_title: n }) });
                loadSessions();
            }
        }

        async function deleteSession(id) {
            if (confirm("確定要刪除嗎？")) {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ mode: 'system', action: 'delete_session', session_id: id }) });
                if (id === currentSessionId) startNewSession(); else loadSessions();
            }
        }
        
        // ✨ 已全面展開排版，徹底解決「標籤」被連字的錯誤
        function openPreview(code) {
            let renderCode = code;
            const isReact = code.includes('export default') || code.includes('import React') || code.includes('className=');
            const isHTML = code.trim().toLowerCase().startsWith('<!doctype html') || code.trim().toLowerCase().startsWith('<html');
            
            if (isReact && !isHTML) {
                let cleanedCode = code.replace(new RegExp('import\\s+.*?from\\s+[\'"].*?[\'"];?', 'g'), '');
                let componentMatch = cleanedCode.match(new RegExp('export\\s+default\\s+function\\s+([A-Za-z0-9_]+)'));
                let renderTarget = componentMatch ? componentMatch[1] : 'App';
                cleanedCode = cleanedCode.replace(new RegExp('export\\s+default\\s+function', 'g'), 'function');
                
                renderCode = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js">${'<'}/script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">${'<'}/script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">${'<'}/script>
    <script src="https://cdn.tailwindcss.com">${'<'}/script>
    <script src="https://unpkg.com/lucide@latest">${'<'}/script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;
        try {
            ${cleanedCode}
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<${renderTarget} />);
            setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 100);
        } catch(err) {
            document.getElementById('root').innerHTML = '<div class="p-4 text-red-700"><strong>渲染錯誤:</strong><br>' + err.message + '</div>';
        }
    ${'<'}/script>
</body>
</html>`;
            }
            
            currentRenderCode = renderCode;
            document.getElementById('preview-modal').classList.remove('hidden');
            document.getElementById('preview-modal').classList.add('flex');
            document.getElementById('preview-iframe').srcdoc = renderCode;
        }

        function closePreview() {
            document.getElementById('preview-modal').classList.add('hidden');
            document.getElementById('preview-modal').classList.remove('flex');
            document.getElementById('preview-iframe').srcdoc = '';
        }

        function refreshPreview() {
            if (currentRenderCode) {
                document.getElementById('preview-iframe').srcdoc = currentRenderCode;
            }
        }

        window.onload = () => {
            loadSessions();
            loadGems();
        };
    </script>
</body>
</html>
